<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1">

  <title>Achadinhos da Bekinha</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="pagina">

    <!-- BLOCO 1: VÍDEO E IMAGEM -->
    <section class="bloco-apresentacao">

      <div class="area-video">

        <video
          id="videoBekinha"
          class="video-bekinha"
          controls
          playsinline
          preload="metadata">

          Seu navegador não consegue reproduzir este vídeo.

        </video>

      </div>

      <div class="area-banner">

        <img
          id="bannerBekinha"
          class="banner-bekinha"
          src=""
          alt="Achadinhos da Bekinha">

      </div>

    </section>


    <!-- BLOCO 2: PRODUTOS -->
    <section class="bloco-produtos">

      <div class="titulo-produtos">

        <span class="detalhe-titulo"></span>

        <h1>Achadinhos selecionados para você</h1>

        <p>
          Confira as ofertas escolhidas pela Bekinha.
        </p>

      </div>

      <div
        id="mensagem"
        class="mensagem">

        Carregando produtos...

      </div>

      <div
        id="categorias"
        class="categorias">

      </div>

    </section>

  </main>

  <script src="app.js"></script>

</body>

</html>
