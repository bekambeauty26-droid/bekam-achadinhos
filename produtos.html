<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Achadinhos da Bekinha</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="pagina">

        <section class="area-produtos">

    <div class="grade-categorias">

        <section class="bloco-categoria">

            <h2 class="titulo-categoria">
                Perfumes Femininos
            </h2>

            <div class="lista-produtos">

                <article class="card-produto">

                    <div class="imagem-produto">
                        <img
                            src="https://via.placeholder.com/300x300?text=Produto+1"
                            alt="Perfume feminino">
                    </div>

                    <div class="dados-produto">

                        <h3 class="nome-produto">
                            Perfume Feminino Floratta Red
                        </h3>

                        <div class="preco-produto">
                            R$ 129,90
                        </div>

                        <a
                            class="botao-oferta"
                            href="#">

                            VER OFERTA

                        </a>

                    </div>

                </article>

                <article class="card-produto">

                    <div class="imagem-produto">
                        <img
                            src="https://via.placeholder.com/300x300?text=Produto+2"
                            alt="Kit de perfume feminino">
                    </div>

                    <div class="dados-produto">

                        <h3 class="nome-produto">
                            Kit Presente Feminino
                        </h3>

                        <div class="preco-produto">
                            R$ 189,90
                        </div>

                        <a
                            class="botao-oferta"
                            href="#">

                            VER OFERTA

                        </a>

                    </div>

                </article>

            </div>

        </section>

        <section class="bloco-categoria">

            <h2 class="titulo-categoria">
                Cuidados com os Cabelos
            </h2>

            <div class="lista-produtos">

                <article class="card-produto">

                    <div class="imagem-produto">
                        <img
                            src="https://via.placeholder.com/300x300?text=Produto+3"
                            alt="Máscara para cabelos">
                    </div>

                    <div class="dados-produto">

                        <h3 class="nome-produto">
                            Máscara de Tratamento Capilar
                        </h3>

                        <div class="preco-produto">
                            R$ 49,90
                        </div>

                        <a
                            class="botao-oferta"
                            href="#">

                            VER OFERTA

                        </a>

                    </div>

                </article>

                <article class="card-produto">

                    <div class="imagem-produto">
                        <img
                            src="https://via.placeholder.com/300x300?text=Produto+4"
                            alt="Shampoo e condicionador">
                    </div>

                    <div class="dados-produto">

                        <h3 class="nome-produto">
                            Kit Shampoo e Condicionador
                        </h3>

                        <div class="preco-produto">
                            Consulte a oferta
                        </div>

                        <a
                            class="botao-oferta"
                            href="#">

                            VER OFERTA

                        </a>

                    </div>

                </article>

            </div>

        </section>

    </div>

</section>

    </main>

    <script src="app.js"></script>

</body>

</html>
